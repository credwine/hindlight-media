<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="description" content="Page not found - this scene didn't make the edit. Head back to the HindLight Media reel.">
  <title>Page Not Found | HindLight Media</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:#F1F1F1;color:#111;font-family:'Archivo',Arial,sans-serif;
      text-align:center;padding:24px}
    main{max-width:720px}
    .slate{
      display:inline-block;font-weight:800;font-size:.8rem;letter-spacing:.28em;
      text-transform:uppercase;color:#F1F1F1;background:#111;
      padding:8px 18px;border-radius:3px;margin-bottom:28px}
    h1{
      font-weight:900;text-transform:uppercase;line-height:1.05;
      font-size:clamp(2.2rem,6vw,4rem);letter-spacing:-.01em}
    h1 em{font-style:normal;color:#FF3D00}
    p{font-size:1.15rem;line-height:1.6;margin:22px auto 36px;max-width:480px;color:#333}
    .btn{
      display:inline-block;padding:17px 38px;border-radius:4px;
      background:linear-gradient(100deg,#FF3D00 0%,#FF8F00 100%);
      color:#1a1208;font-weight:800;text-transform:uppercase;letter-spacing:.1em;
      font-size:.95rem;text-decoration:none;transition:transform .2s ease,box-shadow .25s ease}
    .btn:hover{transform:translateY(-1px);box-shadow:0 10px 34px rgba(255,90,0,.45)}
    .alt{display:block;margin-top:26px;font-size:.95rem;color:#333}
    .alt a{color:#FF3D00;font-weight:800}
    a:focus-visible{outline:2px solid #C43000;outline-offset:3px}
  </style>
</head>
<body>
  <main>
    <span class="slate">Take 404 &mdash; Scene missing</span>
    <h1>Cut! This scene didn't make the <em>edit</em>.</h1>
    <p>The page you're looking for ended up on the cutting room floor.</p>
    <a class="btn" href="./">Back to the reel</a>
    <span class="alt">Looking for us? <a href="contact">Get in touch</a>.</span>
  </main>
</body>
