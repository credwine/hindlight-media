<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cut! Scene Not Found | HindLight Media</title>
<meta name="description" content="This page ended up on the cutting room floor. Head back to HindLight Media's homepage for video production that moves people.">
<meta name="robots" content="noindex">
<link rel="icon" href="assets/img/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gloock&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0A0A0A;--bone:#F5F5F5;--gold:#FFB347;--muted:#9E9E9E;--line:#242424;--fire:linear-gradient(100deg,#FF3D00 0%,#FF8F00 60%,#FFD54F 100%)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ink);color:var(--bone);font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.slate{font-size:.72rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:24px}
h1{font-family:'Gloock',serif;font-weight:400;font-size:clamp(2.4rem,8vw,4.5rem);line-height:1.1}
h1 em{font-style:italic;background:var(--fire);-webkit-background-clip:text;background-clip:text;color:transparent}
p{color:var(--muted);font-size:.85rem;letter-spacing:.06em;margin-top:22px;line-height:1.8}
a.btn{display:inline-block;margin-top:36px;padding:15px 30px;border-radius:2px;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;background:var(--fire);color:#0A0A0A;font-weight:600;text-decoration:none}
a.btn:hover{box-shadow:0 0 38px rgba(255,143,0,.5)}
a:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
::selection{background:var(--gold);color:var(--ink)}
</style>
</head>
<body>
<main>
  <div class="slate">Take 404 // Scene Missing</div>
  <h1>Cut! This scene didn't <em>make the edit.</em></h1>
  <p>The page you're looking for ended up on the cutting room floor.<br>Let's get you back to the feature presentation.</p>
  <a class="btn" href="./">Back to the Reel</a>
</main>
</body>
</html>
